version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hantios-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hantios_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecret123}
      POSTGRES_DB: ${POSTGRES_DB:-hantios_prod}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hantios-backend
    restart: always
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://${POSTGRES_USER:-hantios_admin}:${POSTGRES_PASSWORD:-supersecret123}@db:5432/${POSTGRES_DB:-hantios_prod}
      JWT_SECRET: ${JWT_SECRET:-changethisinproduction123}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost}
    ports:
      - "5000:5000"
    volumes:
      - ./server/uploads:/usr/src/app/uploads

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hantios-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
